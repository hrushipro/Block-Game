<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Minimal Tetris</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="layout">
    <h1>Minimal Tetris</h1>
    <div class="game-wrap">
      <canvas id="tetris" width="240" height="480" aria-label="Tetris board"></canvas>
      <aside class="panel">
        <p>Score: <span id="score">0</span></p>
        <p>Lines: <span id="lines">0</span></p>
        <div class="btn-group">
          <button id="pause-btn" onclick="togglePause()">Pause</button>
          <button id="restart-btn" onclick="restartGame()">Restart</button>
        </div>
        <p>Controls</p>
        <ul>
          <li>Left / Right: Move</li>
          <li>Down: Soft drop</li>
          <li>Q / W or Up: Rotate</li>
          <li>P / Esc: Pause</li>
          <li>R: Restart</li>
        </ul>
      </aside>
    </div>
  </main>
  <script src="game.js"></script>
</body>
</html>
